<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天演獸史詩 - 楓橋夜泊 孟寰</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --line: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --active: #0f766e;
      --active-bg: #d1fae5;
      --danger: #b91c1c;
      --ok: #166534;
      --shadow: 0 10px 24px rgba(2, 6, 23, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 42%, #f8fafc 100%);
      color: var(--text);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .title-sub {
      margin-left: 8px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 14px;
    }

    .round-chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.92rem;
      background: #e2e8f0;
      color: #0f172a;
    }

    .round-chip.done {
      background: #dcfce7;
      color: #166534;
    }

    .jar-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .jar-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #1f2937;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 10px 8px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .jar-btn:hover {
      border-color: #9ca3af;
      transform: translateY(-1px);
    }

    .jar-btn.active {
      background: var(--active-bg);
      border-color: var(--active);
      color: var(--active);
    }

    .jar-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .quick-result {
      margin-top: 10px;
      padding: 0;
      font-size: 0.93rem;
      line-height: 1.45;
    }

    .quick-result-grid {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-result-cell {
      text-align: center;
      min-height: 42px;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid transparent;
      padding: 10px 8px;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      box-sizing: border-box;
    }

    .role-team1 {
      background: #eaf6ef;
      border-color: #bfdcc8;
      color: #2f6a45;
    }

    .role-team2 {
      background: #fff8e8;
      border-color: #ecdcae;
      color: #8b6a12;
    }

    .role-team3 {
      background: #fdeff0;
      border-color: #e8c3c6;
      color: #8c3e44;
    }

    .role-king {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #4b5563;
    }

    .role-empty {
      background: #f8fafc;
      border-color: #e5e7eb;
      color: #94a3b8;
    }

    .debuff-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .debuff-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #374151;
      white-space: nowrap;
    }

    .battle-grid {
      display: block;
    }

    .debuff-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #374151;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 5px 10px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .debuff-btn.active {
      background: #fee2e2;
      border-color: #dc2626;
      color: #991b1b;
    }

    .debuff-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (min-width: 781px) {
      .debuff-btn {
        min-width: 110px;
      }
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button.action {
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    #confirmBtn {
      min-width: 160px;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-hover);
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .secondary:hover {
      background: #d1d5db;
    }

    .message {
      margin-top: 12px;
      min-height: 24px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--ok);
    }

    .result-wrap {
      overflow-x: auto;
      margin-top: 8px;
    }

    table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 0.93rem;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
    }

    tr.current-round td {
      background: #fef3c7;
    }

    tr.pending-round td {
      color: #6b7280;
    }

    .stats {
      margin-top: 12px;
      display: grid;
      gap: 6px;
      font-size: 0.94rem;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    @media (max-width: 780px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 16px;
      }

      /* 第一個卡片文字放大，和 2rem 按鈕比例一致 */
      h1 {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1.2;
      }

      .title-sub {
        display: inline;
        margin-left: 8px;
        margin-top: 0;
        font-size: 1.3rem;
        font-weight: 500;
      }

      .subtitle,
      .hint,
      .message {
        font-size: 1.3rem;
        line-height: 1.5;
      }

      .round-chip {
        font-size: 1.2rem;
        padding: 10px 14px;
      }

      .debuff-row {
        gap: 6px;
        flex-wrap: nowrap;
      }

      .debuff-label {
        flex: 0 0 auto;
        font-size: 1.2rem;
      }

      .debuff-btn {
        flex: 1 1 0;
        min-height: 80px;
        font-size: 2rem;
        padding: 4px 0;
        text-align: center;
      }

      /* 手機：左屬性、右隊伍標記，兩欄直式對照 */
      .battle-grid {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .quick-result {
        margin-top: 0;
      }

      .jar-grid,
      .quick-result-grid {
        margin-top: 0;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .jar-btn,
      .role-badge {
        min-height: 88px;
        padding: 10px 10px;
        font-size: 2rem;
      }

      .actions {
        gap: 8px;
      }

      button.action {
        flex: 1 1 100%;
        min-height: 96px;
        padding: 14px 16px;
        font-size: 2rem;
      }

      table {
        font-size: 1.02rem;
      }

      th, td {
        padding: 10px 8px;
      }

      /* 手機同樣維持第一卡文字 1.5 倍 */
      .main-card h1 {
        font-size: 3rem;
      }

      .main-card .title-sub {
        font-size: 1.95rem;
      }

      .main-card .subtitle,
      .main-card .hint,
      .main-card .message {
        font-size: 1.83rem;
      }

      .main-card .round-chip,
      .main-card .debuff-label {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card main-card">
      <h1>天演獸史詩 <span class="title-sub">楓橋夜泊 孟寰</span></h1>
      <p class="subtitle">每輪按下罐子出現的 3 個屬性，系統會立即建議第1隊、第2隊、第3隊站位（狂暴固定存在）。</p>

      <div class="row">
        <span class="round-chip" id="roundChip">目前：第 1 輪</span>
      </div>

      <div id="debuffRow" class="debuff-row"></div>
      <div class="battle-grid">
        <div id="jarGrid" class="jar-grid"></div>
        <div class="quick-result">
          <div class="quick-result-grid" id="quickResult"></div>
        </div>
      </div>

      <div class="actions">
        <button class="action primary" id="confirmBtn">確認本輪</button>
        <button class="action secondary" id="undoBtn">回上一輪</button>
        <button class="action secondary" id="resetBtn">全部重置</button>
      </div>

      <div id="message" class="message"></div>
      <div class="hint">規則：選滿 3 個屬性會自動計算建議；調整禁狂暴也會即時重算。按「確認本輪」才會鎖定並進入下一輪。</div>
    </section>

    <section class="card">
      <h2 style="margin:0; font-size:1.2rem;">已鎖定輪次與統計</h2>
      <div id="result" class="result-wrap"></div>
      <div id="stats" class="stats"></div>
    </section>
  </div>

  <script>
    const ATTRS = ["會心", "氣血", "移速", "攻速", "範圍"];
    const JAR_PRIORITY = ["狂暴", "會心", "氣血", "移速", "攻速", "範圍"];

    const state = {
      currentRound: 1,
      selected: new Set(),
      records: [],
      usedAttrs: [new Set(), new Set(), new Set()],
      noBerserk: [false, false, false],
      currentSuggestion: null
    };

    const jarGridEl = document.getElementById("jarGrid");
    const roundChipEl = document.getElementById("roundChip");
    const debuffRowEl = document.getElementById("debuffRow");
    const quickResultEl = document.getElementById("quickResult");
    const messageEl = document.getElementById("message");
    const resultEl = document.getElementById("result");
    const statsEl = document.getElementById("stats");

    function setMessage(text, type = "") {
      messageEl.textContent = text;
      messageEl.className = `message ${type}`.trim();
    }

    function updateRoundChip() {
      if (state.currentRound <= 3) {
        roundChipEl.className = "round-chip";
        roundChipEl.textContent = `目前：第 ${state.currentRound} 輪`;
      } else {
        roundChipEl.className = "round-chip done";
        roundChipEl.textContent = "3 輪已完成";
      }
    }

    function renderJarButtons() {
      jarGridEl.innerHTML = "";
      const roundDone = state.currentRound > 3;

      ATTRS.forEach((attr) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `jar-btn ${state.selected.has(attr) ? "active" : ""}`.trim();
        btn.textContent = attr;

        const cannotSelectMore = state.selected.size >= 3 && !state.selected.has(attr);
        btn.disabled = roundDone || cannotSelectMore;

        btn.addEventListener("click", () => {
          if (state.selected.has(attr)) {
            state.selected.delete(attr);
          } else if (state.selected.size < 3) {
            state.selected.add(attr);
          }
          renderJarButtons();
          recomputeCurrentSuggestion();
        });

        jarGridEl.appendChild(btn);
      });

      const berserkBtn = document.createElement("button");
      berserkBtn.type = "button";
      berserkBtn.className = "jar-btn";
      berserkBtn.textContent = "狂暴";
      berserkBtn.disabled = true;
      jarGridEl.appendChild(berserkBtn);
    }

    function renderDebuffButtons() {
      debuffRowEl.innerHTML = "";
      const title = document.createElement("span");
      title.className = "debuff-label";
      title.textContent = "禁狂暴";
      debuffRowEl.appendChild(title);

      const labels = ["1隊", "2隊", "3隊"];
      const round3LockedTeam = state.currentRound === 3 ? getRoundBerserkTeam(2) : -1;
      labels.forEach((label, idx) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `debuff-btn ${state.noBerserk[idx] ? "active" : ""}`.trim();
        btn.textContent = label;
        // 第3輪延續機制：第2輪吃狂暴那隊必須禁狂暴，不可手動關閉
        if (idx === round3LockedTeam) btn.disabled = true;
        btn.addEventListener("click", () => {
          state.noBerserk[idx] = !state.noBerserk[idx];
          renderDebuffButtons();
          recomputeCurrentSuggestion();
        });
        debuffRowEl.appendChild(btn);
      });
    }

    function renderQuickResult(record) {
      const allJars = [...ATTRS, "狂暴"];
      const roleByJar = {};
      if (record) {
        roleByJar[record.teams[0]] = { text: "1隊", cls: "role-team1" };
        roleByJar[record.teams[1]] = { text: "2隊", cls: "role-team2" };
        roleByJar[record.teams[2]] = { text: "3隊", cls: "role-team3" };
        roleByJar[record.king] = { text: "王吸收", cls: "role-king" };
      }
      quickResultEl.innerHTML = allJars.map((jar) => {
        const role = roleByJar[jar] || { text: "-", cls: "role-empty" };
        return `<div class="quick-result-cell"><span class="role-badge ${role.cls}">${role.text}</span></div>`;
      }).join("");
    }

    function getRoundBerserkTeam(round) {
      const record = state.records.find((rec) => rec.round === round);
      if (!record) return -1;
      return record.teams.findIndex((jar) => jar === "狂暴");
    }

    function applyRoundDebuffDefaults() {
      state.noBerserk = [false, false, false];
      // 第3輪預設：第2輪吃狂暴的那隊先禁狂暴（可視化提醒）
      if (state.currentRound === 3) {
        const round2BerserkTeam = getRoundBerserkTeam(2);
        if (round2BerserkTeam !== -1) state.noBerserk[round2BerserkTeam] = true;
      }
    }

    function compareCandidate(a, b) {
      if (!b) return 1;
      // 第一優先：讓玩家吃機制簡單的罐子（狂暴 > 會心 > 氣血 > ...）
      for (let i = 0; i < a.easeKey.length; i += 1) {
        if (a.easeKey[i] !== b.easeKey[i]) return a.easeKey[i] > b.easeKey[i] ? 1 : -1;
      }
      // 第二優先：第一優先相同時，盡量把狂暴給第3隊
      if (a.team3Berserk !== b.team3Berserk) return a.team3Berserk > b.team3Berserk ? 1 : -1;
      // 第三優先：保留後續輪次可用屬性空間
      if (a.flexibility !== b.flexibility) return a.flexibility > b.flexibility ? 1 : -1;
      return 0;
    }

    function findBestForCurrentRound(attrs) {
      const jars = [...attrs, "狂暴"];
      const round2BerserkTeam = state.currentRound === 3 ? getRoundBerserkTeam(2) : -1;
      let best = null;

      for (let i = 0; i < 4; i += 1) {
        for (let j = 0; j < 4; j += 1) {
          if (j === i) continue;
          for (let k = 0; k < 4; k += 1) {
            if (k === i || k === j) continue;

            const teams = [jars[i], jars[j], jars[k]];
            let valid = true;

            for (let t = 0; t < 3; t += 1) {
              const jar = teams[t];
              // Debuff：被標記禁狂暴的隊伍，本輪不可分配狂暴
              if (jar === "狂暴" && state.noBerserk[t]) {
                valid = false;
                break;
              }
              // 硬性規則：第2輪與第3輪狂暴不能同隊
              if (jar === "狂暴" && state.currentRound === 3 && t === round2BerserkTeam) {
                valid = false;
                break;
              }
              // 核心機制：同隊跨輪吃重複屬性會死掉，所以直接視為非法方案
              if (jar !== "狂暴" && state.usedAttrs[t].has(jar)) {
                valid = false;
                break;
              }
            }
            if (!valid) continue;

            const occupied = new Set([i, j, k]);
            const kingIdx = [0, 1, 2, 3].find((idx) => !occupied.has(idx));
            const king = jars[kingIdx];

            const tempUsage = state.usedAttrs.map((set) => new Set(set));
            for (let t = 0; t < 3; t += 1) {
              if (teams[t] !== "狂暴") tempUsage[t].add(teams[t]);
            }

            const candidate = {
              teams,
              king,
              // 以優先序計算偏好鍵，越前面的罐子數量越多越好
              easeKey: JAR_PRIORITY.map((jarName) => teams.filter((jar) => jar === jarName).length),
              team3Berserk: teams[2] === "狂暴" ? 1 : 0,
              flexibility: tempUsage.reduce((sum, set) => sum + (5 - set.size), 0)
            };

            if (compareCandidate(candidate, best) > 0) {
              best = candidate;
            }
          }
        }
      }

      return best;
    }

    function recomputeCurrentSuggestion() {
      state.currentSuggestion = null;

      if (state.currentRound > 3) {
        renderQuickResult(state.records[state.records.length - 1] || null);
        return;
      }

      if (state.selected.size !== 3) {
        renderQuickResult(null);
        setMessage("");
        return;
      }

      const attrs = [...state.selected];
      // 特例規則：攻速+範圍同時出現時，直接提示重開，不進行分配
      if (attrs.includes("攻速") && attrs.includes("範圍")) {
        renderQuickResult(null);
        setMessage("請自斷重新開始", "error");
        return;
      }

      const best = findBestForCurrentRound(attrs);
      if (!best) {
        renderQuickResult(null);
        setMessage(`第 ${state.currentRound} 輪找不到合法站位，請調整屬性或禁狂暴。`, "error");
        return;
      }

      state.currentSuggestion = {
        round: state.currentRound,
        attrs,
        jars: [...attrs, "狂暴"],
        teams: [...best.teams],
        king: best.king
      };
      renderQuickResult(state.currentSuggestion);
      setMessage("");
    }

    function recomputeUsedAttrsFromRecords() {
      state.usedAttrs = [new Set(), new Set(), new Set()];
      state.records.forEach((rec) => {
        for (let t = 0; t < 3; t += 1) {
          const jar = rec.teams[t];
          if (jar !== "狂暴") state.usedAttrs[t].add(jar);
        }
      });
    }

    function renderRecordsAndStats() {
      const recordMap = new Map(state.records.map((rec) => [rec.round, rec]));
      const latestRecommendedRound = state.records.length
        ? state.records[state.records.length - 1].round
        : null;
      const rows = [1, 2, 3].map((round) => {
        const rec = recordMap.get(round);
        const classNames = [];
        // Highlight 顯示「最新建議」那一行，方便實戰時快速看最新答案
        if (rec && latestRecommendedRound === round) classNames.push("current-round");
        if (!rec) classNames.push("pending-round");
        const rowClass = classNames.length ? ` class="${classNames.join(" ")}"` : "";
        if (!rec) {
          return `
            <tr${rowClass}>
              <td>第 ${round} 輪</td>
              <td>（待輸入）</td>
              <td>-</td>
              <td>-</td>
              <td>-</td>
              <td>-</td>
            </tr>
          `;
        }
        return `
          <tr${rowClass}>
            <td>第 ${rec.round} 輪</td>
            <td>${rec.jars.join(" / ")}</td>
            <td>${rec.teams[0]}</td>
            <td>${rec.teams[1]}</td>
            <td>${rec.teams[2]}</td>
            <td>${rec.king}</td>
          </tr>
        `;
      }).join("");

      resultEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>輪次</th>
              <th>出現罐子</th>
              <th>第1隊</th>
              <th>第2隊</th>
              <th>第3隊</th>
              <th>王吸收</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      const usage = state.usedAttrs.map((set, idx) => {
        const items = [...set];
        return `第${idx + 1}隊：${items.length ? items.join("、") : "（無）"}`;
      });

      statsEl.innerHTML = `
        <div><strong>每隊已站過屬性：</strong>${usage.join(" ｜ ")}</div>
      `;
    }

    function confirmRound() {
      if (state.currentRound > 3) {
        setMessage("3 輪已完成，如需調整請先回上一輪或重置。", "error");
        return;
      }

      if (!state.currentSuggestion) {
        setMessage(`第 ${state.currentRound} 輪尚未產生可鎖定的建議，請先選滿 3 個屬性。`, "error");
        return;
      }

      const record = {
        round: state.currentSuggestion.round,
        attrs: [...state.currentSuggestion.attrs],
        jars: [...state.currentSuggestion.jars],
        teams: [...state.currentSuggestion.teams],
        king: state.currentSuggestion.king
      };

      state.records.push(record);
      recomputeUsedAttrsFromRecords();
      renderQuickResult(record);

      state.currentRound += 1;
      state.selected.clear();
      state.currentSuggestion = null;
      applyRoundDebuffDefaults();
      updateRoundChip();
      renderJarButtons();
      renderDebuffButtons();
      renderQuickResult(null);
      renderRecordsAndStats();

      if (state.currentRound > 3) {
        setMessage("3 輪建議已全部完成。", "success");
      } else {
        setMessage(`第 ${record.round} 輪已鎖定，請輸入第 ${state.currentRound} 輪。`, "success");
      }
    }

    function undoRound() {
      if (state.records.length === 0) {
        setMessage("目前沒有可回退的輪次。", "error");
        return;
      }

      const last = state.records.pop();
      state.currentRound = last.round;
      state.selected = new Set(last.attrs);
      applyRoundDebuffDefaults();
      recomputeUsedAttrsFromRecords();
      renderRecordsAndStats();
      updateRoundChip();
      renderJarButtons();
      renderDebuffButtons();
      recomputeCurrentSuggestion();

      setMessage(`已回到第 ${state.currentRound} 輪，可重新選擇。`, "success");
    }

    function resetAll() {
      state.currentRound = 1;
      state.selected = new Set();
      state.records = [];
      state.usedAttrs = [new Set(), new Set(), new Set()];
      state.currentSuggestion = null;
      applyRoundDebuffDefaults();

      setMessage("");
      updateRoundChip();
      renderJarButtons();
      renderDebuffButtons();
      renderQuickResult(null);
      renderRecordsAndStats();
    }

    document.getElementById("confirmBtn").addEventListener("click", confirmRound);
    document.getElementById("undoBtn").addEventListener("click", undoRound);
    document.getElementById("resetBtn").addEventListener("click", resetAll);

    resetAll();
  </script>
</body>
</html>
